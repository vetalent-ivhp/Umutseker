<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeTalent İVHP</title>
  <link rel="manifest" href="manifest.json">
  <!-- CSS dosyan artık app.css -->
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- Hoşgeldin Banner -->
  <div id="hosgeldinArea"></div>
  <div id="saatTarih"></div>

  <!-- Önerilen İlanlar -->
  <div id="onerilenArea"></div>

  <!-- Hızlı CV Kartı -->
  <div id="cvCard"></div>

  <!-- İlanlar -->
  <div id="pg-ilanlar" class="pg"></div>

  <!-- Nöbet Takası -->
  <div id="pg-nobet" class="pg"></div>

  <!-- Admin Panel -->
  <div id="adminPanel">
    <div id="adminLock">
      <input type="password" id="adminPass" placeholder="Admin Şifre">
      <button onclick="checkAdminPass()">Giriş</button>
      <div id="adminErr" style="display:none;color:red">Hatalı şifre!</div>
    </div>
    <div id="adminContent" style="display:none">
      <div id="adminStats"></div>
      <table><tbody id="adminBody"></tbody></table>
    </div>
  </div>

  <!-- JS dosyan artık app.js -->
  <script src="app.js"></script>
</body>
</html>
