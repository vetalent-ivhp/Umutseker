<!DOCTYPE html>

    <style>
        body { background: #050811; color: #e2e8f0; font-family: 'Poppins', sans-serif; overflow-x: hidden; margin: 0; }
        
        /* Claude Style Deep Background */
        body::before {
            content: ""; position: fixed; inset: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 15% 15%, rgba(30, 58, 138, 0.45) 0%, transparent 45%),
                        radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.3) 0%, transparent 45%),
                        radial-gradient(circle at 50% 50%, rgba(76, 29, 149, 0.2) 0%, transparent 50%);
            animation: move 25s infinite alternate linear; z-index: -1; filter: blur(70px);
        }
        @keyframes move { from { transform: rotate(0deg) scale(1); } to { transform: rotate(8deg) scale(1.1); } }

        .glass { background: rgba(23, 32, 53, 0.35); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.06); }
        .logo-box { width: 75px; height: 75px; object-fit: contain; border-radius: 1.2rem; background: white; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.1); }
        
        #splash { position: fixed; inset: 0; background: #050811; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.2s cubic-bezier(0.65, 0, 0.35, 1); }
        .hide-splash { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .btn-main { background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%); box-shadow: 0 15px 35px -10px rgba(16, 185, 129, 0.5); font-weight: 800; transition: 0.3s; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
        
        .add-fab { position: fixed; bottom: 100px; right: 25px; width: 60px; height: 60px; border-radius: 20px; background: #3b82f6; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4); border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .add-fab:active { transform: scale(0.85) rotate(90deg); }

        .status-pill { font-[8px] font-black px-2.5 py-1 rounded-full bg-white/5 border border-white/10 uppercase tracking-[0.2em]; }
    </style>
</head>
