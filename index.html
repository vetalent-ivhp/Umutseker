<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VeTalent İVHP — Veteriner İstihdam</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1f16; --bg2: #112018; --card: #172d1f; --border: rgba(52,201,122,0.15);
            --green: #34c97a; --text: #e4f2ea; --muted: #6b9478; --wa: #25d366; --red: #ff6b6b;
            --blue: #4db8ff; --yellow: #f5c842;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }
        
        /* Hareketli Arka Plan (Claude Tarzı) */
        .bg-glow { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a3a2a 0%, var(--bg) 70%); opacity: 0.5; }

        /* Splash Screen */
        #splash { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 40px 22px; transition: 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .hide-splash { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        .logo-box { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
        .p-logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--green); background: #fff; object-fit: contain; padding: 4px; }
        
        .glass-card { background: rgba(23, 45, 31, 0.6); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 28px; padding: 25px; width: 100%; text-align: center; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .vision-text { font-size: 13px; font-weight: 800; color: var(--green); margin-top: 8px; text-transform: lowercase; }

        /* Main App */
        #app { display: none; padding: 20px 20px 100px; }
        #app.on { display: block; }

        /* Search & Filters */
        .search-wrap { position: relative; margin-bottom: 20px; }
        .search-in { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 14px 14px 45px; color: #fff; outline: none; }
        .search-ic { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); }

        /* Job Cards */
        .job-card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 20px; margin-bottom: 15px; position: relative; transition: 0.3s; }
        .job-card:active { transform: scale(0.97); }
        .expired { border-color: var(--red); }
        .expired-tag { background: rgba(255, 107, 107, 0.15); color: var(--red); font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; display: inline-block; margin-top: 10px; }
        
        .risk-warning { font-size: 10px; color: var(--yellow); background: rgba(245, 200, 66, 0.1); padding: 5px 10px; border-radius: 8px; margin-top: 8px; display: flex; align-items: center; gap: 5px; }

        .btn-wa { background: var(--wa); color: #fff; width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; text-decoration: none; font-size: 14px; }
        
        /* Tab Bar */
        .tab-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(17, 32, 24, 0.9); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 24px; display: flex; justify-content: space-around; padding: 12px; z-index: 100; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); cursor: pointer; }
        .tab-item.active { color: var(--green); }
        .tab-item i { font-size: 18px; }
        .tab-item span { font-size: 10px; font-weight: 700; }

        /* Form Overlay */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; padding: 20px; overflow-y: auto; }
        .overlay.open { display: flex; }
        .form-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 28px; padding: 25px; width: 100%; }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
        .field select, .field input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; font-family: inherit; outline: none; }
        
        .kvkk-box { display: flex; gap: 10px; margin-top: 15px; font-size: 11px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div id="splash">
        <div class="logo-box">
            <img src="https://i.ibb.co/vzPRY89/ivhp-logo.png" class="p-logo" onerror="this.src='https://via.placeholder.com/60'">
            <span style="color:var(--muted); font-weight: 800;">✕</span>
            <img src="https://i.ibb.co/KyVf4Zr/vetalent-logo.png" class="p-logo" onerror="this.src='https://via.placeholder.com/60'">
        </div>
        
        <div class="glass-card">
            <p style="font-size: 10px; letter-spacing: 3px; color: var(--muted); font-weight: 800;">BU PLATFORM BİR</p>
            <h1 style="font-family: 'Syne'; font-size: 24px; margin: 8px 0; letter-spacing: -1px;">VETALENT-İVHP</h1>
            <p style="font-size: 11px; color: var(--text); opacity: 0.8;">eseridir & meslektaşlarına armağandır</p>
            <p class="vision-text">ve veteriner hekim umut şeker vizyonudur</p>
        </div>

        <button onclick="startApp()" style="background: linear-gradient(135deg, var(--green), #28a464); color:#000; border:none; width:100%; padding:18px; border-radius:18px; font-weight:800; font-size:15px; cursor:pointer; box-shadow: 0 10px 20px rgba(52,201,122,0.2);">
            SİSTEME GİRİŞ YAP <i class="fas fa-chevron-right" style="margin-left:8px;"></i>
        </button>
    </div>

    <div id="app">
        <header style="margin-bottom: 25px;">
            <p style="font-size: 11px; color: var(--muted); font-weight: 800;">HOŞ GELDİNİZ</p>

        </header>

        <div class="search-wrap">
            <i class="fas fa-search search-ic"></i>
            <input type="text" class="search-in" placeholder="Şehir, isim veya uzmanlık ara..." oninput="filterCards(this.value)">
        </div>

        <div id="card-container">
            <p style="text-align: center; opacity: 0.5; padding: 40px;">A-Takımı Verileri Hazırlıyor...</p>
        </div>
    </div>

            <span>İLANLAR</span>
        </div>
        <div class="tab-item" onclick="toggleForm()">
            <i class="fas fa-plus-circle"></i>
            <span>İLAN EKLE</span>
        </div>
        <div class="tab-item" onclick="alert('KVKK Gereği Güvenli Mod Aktiftir.')">
            <i class="fas fa-shield-alt"></i>
            <span>GÜVENLİ MOD</span>
        </div>
    </nav>

    <div id="form-overlay" class="overlay">
        <div class="form-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="font-family:'Syne'">YENİ İLAN</h3>
                <i class="fas fa-times" onclick="toggleForm()" style="cursor:pointer"></i>
            </div>
            <div class="field">
                <label>İlan Türü</label>
                <select id="f-type">
                    <option value="Hekim">Hekim Arayan (İşveren)</option>
                    <option value="İş">İş Arayan (Hekim)</option>
                </select>
            </div>
            <div class="field">
                <label>Branş / Pozisyon</label>
                <select id="f-branch">
                    <option>Cerrahi</option>
                    <option>Dahiliye
