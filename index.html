<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İVHP İstihdam | Umut Şeker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050811; color: #e2e8f0; font-family: 'Poppins', sans-serif; overflow-x: hidden; position: relative; }
        /* Derin Arka Plan Efekti */
        body::before {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.3) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(16, 185, 129, 0.2) 0%, transparent 40%);
            z-index: -1; filter: blur(80px);
        }
        .glass-card { background: rgba(23, 32, 53, 0.3); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050811; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .hide-splash { transform: translateY(-100%); opacity: 0; visibility: hidden; transition: all 0.8s ease; }
        .enter-btn { background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%); font-weight: 800; }
        .logo-box { width: 85px; height: 85px; border-radius: 1rem; background: rgba(255,255,255,0.05); padding: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .signature { font-size: 10px; font-weight: 300; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-transform: uppercase; font-style: italic; }
    </style>
</head>
<body class="pb-32">

    <div id="splash-screen">
        <div class="flex space-x-4 mb-10">
            <img src="https://i.ibb.co/vzPRY89/ivhp-logo.png" class="logo-box">
            <img src="https://i.ibb.co/YyYf4Zz/vetalent-logo.png" class="logo-box">
        </div>
        <div class="text-center px-10">
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter mb-4 italic">ivhp istihdam</h1>
            <div class="py-6 border-y border-white/5 mb-8">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Vizyon ve Eser</p>
                <h2 class="text-xl font-bold text-blue-400 uppercase">Umut Şeker</h2>
            </div>
            <button onclick="enterPortal()" class="enter-btn px-12 py-4 rounded-xl text-[10px] text-white tracking-widest">GİRİŞ YAP</button>
        </div>
    </div>

    <header class="p-8 text-center">
        <h1 class="text-2xl font-black text-white italic uppercase">ivhp <span class="text-green-500">istihdam</span></h1>
        <p class="signature mt-1">Umut Şeker Vizyonuyla</p>
    </header>

    <div class="px-6 -mt-2 max-w-xl mx-auto">
        <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Şehir veya uzmanlık ara..." 
               class="w-full bg-slate-900/80 border border-white/10 rounded-2xl py-5 px-12 text-sm text-white outline-none focus:ring-2 focus:ring-blue-500 shadow-2xl">
    </div>

    <main id="content" class="p-6 space-y-6 max-w-2xl mx-auto">
        <div class="text-center py-20 opacity-20 italic">Yükleniyor...</div>
    </main>

    <script>
        // FORMÜLÜN ASLI (SABİT ve İŞLEV Yerine CONST ve FUNCTION)
        const sheetID = "1bgqT1T_ZHU6dyyIDDQscDvHUMvgeUHzaA1OQVzishmI";
        const aTakimiLink = "https://chat.whatsapp.com/ThB4yGz6ITNCC6kpTnEGD";
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv&sheet=ivhp%2DIstihdam`;

        function enterPortal() {
            document.getElementById('splash-screen').classList.add('hide-splash');
            fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                window.allData = text.split('\n').slice(1).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                renderCards(window.allData);
            } catch (e) { console.error("Error:", e); }
        }

        function renderCards(rows) {
            const container = document.getElementById('content');
            container.innerHTML = "";
            rows.forEach(cols => {
                const isim = (cols[4] || cols[5] || "").trim();
                if(!isim || isim === "Zaman damgası") return;
                const tur = (cols[1] === "İşveren") ? "İş Veren" : "İş Arıyor";
                container.innerHTML += `
                    <div class="glass-card p-6 border-l-8 ${tur === 'İş Veren' ? 'border-blue-600' : 'border-green-600'}">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-[8px] font-bold text-blue-400 uppercase">${tur}</span>
                                <h3 class="text-lg font-bold text-white">${isim}</h3>
                                <p class="text-xs text-gray-400">${cols[3] || cols[7] || 'Türkiye'}</p>
                            </div>
                            <a href="${aTakimiLink}" class="h-12 w-12 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                                <i class="fas fa-shield-alt text-xl"></i>
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        function filterData() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = window.allData.filter(r => r.join('').toLowerCase().includes(term));
            renderCards(filtered);
        }
    </script>
</body>
</html>
